<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mind-Expander | Minimal Idea Network</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter & Noto Sans JP for premium look) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }
        /* キャンバスドラッグ時のカーソル操作 */
        .canvas-container {
            user-select: none;
            cursor: grab;
        }
        .canvas-container:active {
            cursor: grabbing;
        }
        /* アクティブな接続線の流れるアニメーション（視認性を高めた破線パターン） */
        .node-connection {
            stroke-dasharray: 6 6;
            animation: dash 25s linear infinite;
        }
        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        /* カスタムスクロールバー（極薄） */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #fafafa;
        }
        ::-webkit-scrollbar-thumb {
            background: #e4e4e7;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #d4d4d8;
        }
        /* ダークモード用スクロールバー */
        .dark ::-webkit-scrollbar-track {
            background: #18181b;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #3f3f46;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
        /* 横スクロールバーを非表示にする（パンくずリスト用） */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* 静かなフェードインアニメーション */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between bg-[#fafafa] dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300">

    <!-- ヘッダー / ミニマル・タイトル -->
    <header class="absolute top-0 left-0 right-0 z-30 pointer-events-none p-8 flex justify-between items-start">
        <div class="pointer-events-auto flex flex-col gap-1">
            <h1 class="text-sm font-semibold tracking-wider text-zinc-900 dark:text-zinc-100">AI Mind-Expander</h1>
            <!-- 目的の表示・即時編集エリア -->
            <div class="flex items-center gap-1.5 text-[11px] text-zinc-400 dark:text-zinc-500">
                <span>Goal:</span>
                <span id="displayPurpose" class="text-zinc-600 dark:text-zinc-400 font-medium underline underline-offset-4 decoration-zinc-300 dark:decoration-zinc-700 hover:text-zinc-950 dark:hover:text-zinc-200 cursor-pointer transition-colors max-w-[200px] md:max-w-[400px] truncate" title="クリックして目的を変更">
                    AIにお願いするための文章の続き考えてください。
                </span>
            </div>
        </div>

        <!-- ツールパネル（右上・ミニマル配置） -->
        <div class="pointer-events-auto flex items-center gap-4">
            <!-- 発想トーン選択 -->
            <div class="flex items-center gap-2 text-xs border-b border-zinc-200 dark:border-zinc-800 pb-0.5">
                <span class="text-zinc-400 dark:text-zinc-500">Tone:</span>
                <select id="aiTone" class="bg-transparent text-zinc-800 dark:text-zinc-200 font-medium focus:outline-none cursor-pointer pr-1 [&>option]:text-zinc-800 max-w-[120px] truncate">
                    <!-- JSで動的生成 -->
                </select>
                <button id="btnOpenToneSettings" title="Toneの編集・追加" class="text-zinc-400 hover:text-zinc-900 dark:text-zinc-500 dark:hover:text-zinc-100 transition-colors ml-1">
                    <i class="fa-solid fa-gear text-[10px]"></i>
                </button>
            </div>
            
            <!-- APIモデル情報表示 & 設定ボタン -->
            <div class="flex items-center gap-1 border-l border-zinc-200 dark:border-zinc-800 pl-3">
                <button id="btnToggleTheme" title="テーマ切り替え" class="w-7 h-7 text-zinc-400 hover:text-zinc-900 dark:text-zinc-500 dark:hover:text-zinc-100 flex items-center justify-center transition-colors">
                    <i id="themeIcon" class="fa-solid fa-moon text-xs"></i>
                </button>
                <button id="btnOpenSettings" title="API・モデル設定" class="w-7 h-7 text-zinc-400 hover:text-zinc-900 dark:text-zinc-500 dark:hover:text-zinc-100 flex items-center justify-center transition-colors relative">
                    <i class="fa-solid fa-sliders text-xs"></i>
                    <!-- キー未設定時のインジケータ -->
                    <span id="apiKeyWarningBadge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-amber-500 rounded-full animate-ping hidden"></span>
                </button>
                <button id="btnRecenter" title="中央に戻す" class="w-7 h-7 text-zinc-400 hover:text-zinc-900 dark:text-zinc-500 dark:hover:text-zinc-100 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-compress text-xs"></i>
                </button>
                <button id="btnReset" title="最初からやり直す" class="w-7 h-7 text-zinc-300 hover:text-zinc-950 dark:text-zinc-600 dark:hover:text-zinc-200 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-arrow-rotate-left text-xs"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 操作ヘルプ（左下・シンプル） -->
    <div class="absolute bottom-24 left-8 z-20 pointer-events-none text-[10px] text-zinc-400 dark:text-zinc-600 flex flex-col gap-1 font-mono">
        <div>• ドラッグで移動</div>
        <div>• スクロールで拡縮</div>
        <div>• クリックでアイデアを展開</div>
        <div id="statusActiveModel" class="text-zinc-500 dark:text-zinc-400 mt-2 font-sans text-[11px] normal-case bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded-sm inline-block self-start transition-colors">Active: 未設定</div>
    </div>

    <!-- メインキャンバス領域 (全画面) -->
    <main class="relative flex-1 w-full h-full overflow-hidden canvas-container" id="canvasContainer">
        <!-- 背景（白に極薄の細いドットグリッドパターン） -->
        <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(#e4e4e7_1px,transparent_1px)] dark:bg-[radial-gradient(#27272a_1px,transparent_1px)] bg-[size:24px_24px] opacity-60 transition-colors duration-300"></div>
        
        <!-- 動的コンテンツ(パン・ズーム対象) -->
        <div id="canvasContent" class="absolute inset-0 origin-center transition-transform duration-75 ease-out" style="transform: translate(0px, 0px) scale(1);">
            
            <!-- SVG接続線レイヤー -->
            <svg id="svgConnections" class="absolute inset-0 pointer-events-none w-[10000px] h-[10000px]" style="transform: translate(-5000px, -5000px);"></svg>
            
            <!-- ノード配置レイヤー -->
            <div id="nodesLayer" class="absolute inset-0"></div>
            
        </div>
        
        <!-- 初期入力画面 (1ステップ・ミニマルインプット) -->
        <div id="initialInputOverlay" class="absolute inset-0 z-10 flex items-center justify-center bg-[#fafafa] dark:bg-zinc-950 transition-all duration-700 ease-in-out">
            <div class="max-w-xl w-full mx-6 flex flex-col items-center gap-6">
                
                <!-- テーマの入力欄 -->
                <div class="w-full relative flex flex-col items-center">
                    <div class="relative w-full flex items-center justify-center group">
                        <textarea id="initialWordInput" placeholder="何を広げますか？（テーマ）" autofocus autocomplete="off" rows="1"
                            class="w-full bg-transparent text-zinc-900 dark:text-zinc-100 text-2xl md:text-3xl font-light text-center placeholder-zinc-300 dark:placeholder-zinc-700 border-none focus:outline-none focus:ring-0 py-1 transition-all pr-12 pl-12 resize-none overflow-hidden min-h-[48px]"></textarea>
                        <button id="btnVoiceInput" class="absolute right-0 md:right-4 top-1/2 -translate-y-1/2 w-10 h-10 text-zinc-300 dark:text-zinc-600 hover:text-zinc-700 dark:hover:text-zinc-300 flex items-center justify-center transition-all rounded-full focus:outline-none z-20 bg-white/50 dark:bg-zinc-800/50 hover:bg-white dark:hover:bg-zinc-800 shadow-sm hover:shadow" title="音声で入力">
                            <i id="voiceIcon" class="fa-solid fa-microphone text-lg transition-all"></i>
                        </button>
                    </div>
                    <div class="w-24 h-[1px] bg-zinc-300 dark:bg-zinc-700 mx-auto transition-all duration-500 mt-2" id="inputUnderline"></div>
                </div>
                
                <p class="text-[11px] text-zinc-400 dark:text-zinc-500 font-light text-center tracking-wider" id="inputHint">
                    言葉を入力して [ Enter ] を押してください（Shift + Enterで改行）
                </p>
                <p id="initialSetupPrompt" class="text-xs text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/50 rounded-lg px-4 py-2.5 hidden text-center max-w-sm">
                    <i class="fa-solid fa-triangle-exclamation mr-1.5 animate-bounce"></i>
                    AIを使用するには、まず右上の設定ボタンから APIキーを設定してください。
                </p>
            </div>
        </div>
    </main>

    <!-- API・モデル 設定モーダル -->
    <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 dark:bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md w-full max-w-md mx-4 p-6 rounded-lg border border-zinc-200 dark:border-zinc-800 shadow-2xl flex flex-col gap-5">
            <div class="flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 pb-3">
                <h3 class="text-sm font-semibold tracking-wider text-zinc-950 dark:text-zinc-100 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-zinc-500 dark:text-zinc-400"></i>
                    <span>AI API & MODEL SETTINGS</span>
                </h3>
                <button id="btnCloseSettings" class="text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <!-- プロバイダー選択 -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[11px] font-semibold text-zinc-500 dark:text-zinc-400 tracking-wider">PROVIDER</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="providerGemini" class="py-2 text-xs font-medium rounded border border-zinc-900 bg-zinc-900 text-white dark:bg-zinc-100 dark:border-zinc-100 dark:text-zinc-900 transition-colors">Gemini (公式)</button>
                    <button id="providerOpenAI" class="py-2 text-xs font-medium rounded border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-400 hover:border-zinc-400 dark:hover:border-zinc-500 transition-colors">OpenAI互換</button>
                </div>
            </div>

            <!-- エンドポイント (OpenAI互換用) -->
            <div id="endpointContainer" class="flex flex-col gap-1.5 hidden transition-all">
                <label class="text-[11px] font-semibold text-zinc-500 dark:text-zinc-400 tracking-wider">ENDPOINT URL</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.openai.com/v1" class="w-full text-xs bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-3 py-2.5 focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-500 text-zinc-900 dark:text-zinc-100 transition-colors font-mono">
            </div>

            <!-- APIキー -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[11px] font-semibold text-zinc-500 dark:text-zinc-400 tracking-wider">API KEY</label>
                <div class="relative">
                    <input type="password" id="apiKey" placeholder="キーを入力" class="w-full text-xs bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded pl-3 pr-10 py-2.5 focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-500 text-zinc-900 dark:text-zinc-100 transition-colors font-mono">
                    <button id="btnToggleKeyVisibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-100">
                        <i class="fa-solid fa-eye text-xs" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- モデル選択セクション -->
            <div class="flex flex-col gap-1.5 border-t border-zinc-100 dark:border-zinc-800 pt-4">
                <div class="flex justify-between items-center">
                    <label class="text-[11px] font-semibold text-zinc-500 dark:text-zinc-400 tracking-wider">SELECT MODEL</label>
                    <button id="btnFetchModels" class="text-[10px] text-zinc-600 dark:text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-100 font-medium underline underline-offset-2 flex items-center gap-1">
                        <i class="fa-solid fa-rotate text-[8px]" id="fetchModelsSpinner"></i>
                        <span>モデルリストを取得</span>
                    </button>
                </div>

                <!-- リアルタイムフィルタリング検索 -->
                <div class="relative mt-1">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500 text-[10px]">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="modelSearchInput" placeholder="モデル名でフィルタリング（部分一致）" class="w-full text-[11px] bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded pl-8 pr-3 py-2 focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-500 text-zinc-900 dark:text-zinc-100 transition-colors">
                </div>

                <!-- ドロップダウン -->
                <select id="modelSelect" class="w-full text-xs bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded px-3 py-2.5 focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-500 text-zinc-900 dark:text-zinc-100 transition-colors mt-1.5">
                    <option value="" disabled selected>APIキーを入力してモデルを取得してください</option>
                </select>
            </div>

            <div class="flex gap-2 border-t border-zinc-100 dark:border-zinc-800 pt-4 mt-1">
                <button id="btnSaveSettings" class="flex-1 py-2.5 bg-zinc-900 dark:bg-zinc-100 hover:bg-zinc-800 dark:hover:bg-white text-white dark:text-zinc-900 text-xs font-semibold rounded transition-colors shadow">
                    設定を保存
                </button>
            </div>
        </div>
    </div>

    <!-- トーン設定モーダル -->
    <div id="toneSettingsModal" class="fixed inset-0 z-[55] flex items-center justify-center bg-black/30 dark:bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white/95 dark:bg-zinc-900/95 backdrop-blur-md w-full max-w-2xl mx-4 p-6 rounded-lg border border-zinc-200 dark:border-zinc-800 shadow-2xl flex flex-col gap-5 max-h-[85vh]">
            <div class="flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 pb-3">
                <h3 class="text-sm font-semibold tracking-wider text-zinc-950 dark:text-zinc-100 flex items-center gap-2">
                    <i class="fa-solid fa-masks-theater text-zinc-500 dark:text-zinc-400"></i>
                    <span>TONE SETTINGS</span>
                </h3>
                <button id="btnCloseToneSettings" class="text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="overflow-y-auto pr-2 flex-1" id="toneListScrollArea">
                <div id="toneListContainer" class="flex flex-col gap-4">
                    <!-- JSで動的に生成 -->
                </div>
                
                <button id="btnAddTone" class="w-full mt-4 py-2 border border-dashed border-zinc-300 dark:border-zinc-700 hover:border-zinc-500 dark:hover:border-zinc-500 text-zinc-500 dark:text-zinc-400 hover:text-zinc-800 dark:hover:text-zinc-200 text-xs font-medium rounded transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> 新しいToneを追加
                </button>
            </div>

            <div class="flex gap-2 border-t border-zinc-100 dark:border-zinc-800 pt-4 mt-1">
                <button id="btnSaveTones" class="flex-1 py-2.5 bg-zinc-900 dark:bg-zinc-100 hover:bg-zinc-800 dark:hover:bg-white text-white dark:text-zinc-900 text-xs font-semibold rounded transition-colors shadow">
                    Tone設定を保存
                </button>
            </div>
        </div>
    </div>

    <!-- エラーメッセージトースト用モーダル -->
    <div id="errorModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/20 dark:bg-black/50 backdrop-blur-xs opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-white dark:bg-zinc-900 border border-rose-100 dark:border-rose-900/50 shadow-2xl p-5 rounded-lg max-w-sm w-full mx-4 flex flex-col gap-3">
            <h4 class="text-xs font-bold text-rose-600 dark:text-rose-400 flex items-center gap-1.5 uppercase tracking-wider">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>API Error</span>
            </h4>
            <p id="errorModalMessage" class="text-xs text-zinc-600 dark:text-zinc-300 leading-relaxed break-words">エラーが発生しました。</p>
            <button id="btnDismissError" class="self-end px-4 py-1.5 bg-zinc-900 dark:bg-zinc-100 hover:bg-zinc-800 dark:hover:bg-white text-white dark:text-zinc-900 text-[10px] font-semibold rounded tracking-wider">CLOSE</button>
        </div>
    </div>

    <!-- 下部：思考パスと統合ストーリートレイ -->
    <footer id="bottomDrawer" class="relative z-40 bg-[#fafafa] dark:bg-zinc-950 border-t border-zinc-200 dark:border-zinc-800 transition-all duration-300 ease-in-out flex flex-col overflow-hidden" style="height: 52px;">
        
        <!-- トレイのつまみ -->
        <button id="btnToggleDrawer" class="absolute -top-[27px] left-1/2 -translate-x-1/2 h-[28px] px-5 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 border-b-0 rounded-t-lg shadow-[0_-4px_12px_rgba(0,0,0,0.03)] dark:shadow-[0_-4px_12px_rgba(0,0,0,0.2)] flex items-center justify-center gap-2 cursor-pointer pointer-events-auto transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_-6px_16px_rgba(0,0,0,0.06)] dark:hover:shadow-[0_-6px_16px_rgba(0,0,0,0.3)] group focus:outline-none z-50" title="トレイを開閉">
            <span class="text-[9px] font-semibold tracking-widest text-zinc-400 dark:text-zinc-500 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-colors select-none uppercase">Story</span>
            <!-- 動的インジケータ矢印 -->
            <i id="drawerIndicatorIcon" class="fa-solid fa-chevron-up text-[8px] text-zinc-400 dark:text-zinc-500 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-all duration-300 transform scale-110"></i>
        </button>

        <!-- 常時露出する上部バー：現在の思考ルート -->
        <div class="h-[52px] min-h-[52px] px-8 flex items-center cursor-pointer select-none border-b border-transparent transition-colors duration-300" id="selectedPathContainer" title="クリックしてトレイを開閉">
            <div class="flex items-center gap-3 overflow-x-auto w-full no-scrollbar">
                <span class="font-medium uppercase tracking-wider text-[10px] text-zinc-500 dark:text-zinc-400 select-none flex-shrink-0">Route:</span>
                <span id="pathWordsList" class="flex items-center gap-2 text-zinc-700 dark:text-zinc-300 text-[11px] whitespace-nowrap">
                    <span class="text-zinc-300 dark:text-zinc-600 italic">キャンバスのフレーズを選択してください</span>
                </span>
            </div>
        </div>

        <!-- メイン文章エリア -->
        <div id="drawerContent" class="flex-1 px-8 pb-6 flex gap-8 items-stretch min-h-0 opacity-0 pointer-events-none transition-all duration-300 ease-in-out pt-4">
            <!-- 左側：エディタ -->
            <div class="flex-1 flex flex-col relative h-full">
                <textarea id="storyTextarea" 
                    class="w-full flex-1 bg-transparent text-xs text-zinc-700 dark:text-zinc-200 placeholder-zinc-300 dark:placeholder-zinc-600 focus:outline-none resize-none transition-all h-full leading-relaxed" 
                    placeholder="選択したフレーズたちをつなぎ合わせた文章が、ここに自動で静かに紡がれていきます。"></textarea>
                
                <!-- コピーフィードバック -->
                <div id="copyFeedback" class="absolute bottom-2 right-2 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 text-[10px] font-mono px-2 py-1 rounded shadow-sm pointer-events-none opacity-0 transition-opacity duration-300">
                    COPIED
                </div>
            </div>

            <!-- 右側：ミニマル操作 -->
            <div class="w-48 flex flex-col justify-end gap-2 h-full border-l border-zinc-100 dark:border-zinc-800 pl-6">
                <button id="btnCopyStory" class="w-full py-2.5 bg-zinc-900 dark:bg-zinc-100 hover:bg-zinc-800 dark:hover:bg-white text-white dark:text-zinc-900 text-xs font-medium rounded transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-copy text-[10px]"></i>
                    <span>文章をコピーする</span>
                </button>
                <button id="btnClearStory" class="w-full py-1.5 border border-zinc-200 dark:border-zinc-700 hover:text-zinc-800 dark:hover:text-zinc-200 text-zinc-400 dark:text-zinc-500 text-[10px] font-medium rounded transition-colors">
                    消去
                </button>
            </div>
        </div>
    </footer>

    <script>
        /* ==========================================
         * 1. アプリケーションステート & 定数定義
         * ========================================== */
        function escapeHTML(str) {

        /* ==========================================
         * 3. API経由でのモデルリスト動的取得 (毎回ロード・チェック可能)
         * ========================================== */
        async function fetchModelsFromAPI(isSilent = false) {
            const provider = state.api.provider;
            const key = els.apiKey.value.trim();
            const rawEndpoint = els.apiEndpoint.value.trim();
            
            if (!key) {
                if (!isSilent) {
                    showError("モデル一覧を取得するには、APIキーを入力してください。");
                }
                return;
            }

            els.fetchModelsSpinner.classList.add('animate-spin');
            els.btnFetchModels.disabled = true;

            try {
                let fetchedModels = [];

                if (provider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`Gemini API returned status ${res.status}`);
                    
                    const data = await res.json();
                    if (data.models) {
                        fetchedModels = data.models
                            .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'))
                            .map(m => ({
                                id: m.name,
                                name: m.displayName || m.name
                            }));
                    }
                } else {
                    let endpoint = rawEndpoint || "https://api.openai.com/v1";
                    if (endpoint.endsWith('/')) endpoint = endpoint.slice(0, -1);
                    
                    const url = `${endpoint}/models`;
                    const res = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${key}`
                        }
                    });
                    if (!res.ok) throw new Error(`OpenAI互換 API returned status ${res.status}`);

                    const data = await res.json();
                    if (data.data) {
                        fetchedModels = data.data.map(m => ({
                            id: m.id,
                            name: m.id
                        }));
                    }
                }

                if (fetchedModels.length === 0) {
                    throw new Error("モデルが見つかりませんでした。");
                }

                state.api.availableModels = fetchedModels;
                renderModelsDropdown(fetchedModels);
                
                if (state.api.selectedModel && fetchedModels.some(m => m.id === state.api.selectedModel)) {
                    els.modelSelect.value = state.api.selectedModel;
                } else if (fetchedModels.length > 0) {
                    els.modelSelect.value = fetchedModels[0].id;
                    state.api.selectedModel = fetchedModels[0].id;
                }
                
                els.modelSearchInput.value = '';
                updateStatusActiveModel();

            } catch (error) {
                console.error("Model fetch failed:", error);
                if (!isSilent) {
                    showError(`モデル取得エラー: ${error.message}\nAPIキーまたはエンドポイントが正しいかご確認ください。`);
                }
                els.modelSelect.innerHTML = `<option value="" disabled selected>接続確認エラー: モデルを取得できませんでした</option>`;
            } finally {
                els.fetchModelsSpinner.classList.remove('animate-spin');
                els.btnFetchModels.disabled = false;
            }
        }

        function renderModelsDropdown(modelsList, filterQuery = '') {
            els.modelSelect.innerHTML = '';
            
            const normalizedQuery = filterQuery.toLowerCase().trim();
            const filtered = modelsList.filter(m => 
                m.id.toLowerCase().includes(normalizedQuery) || 
                m.name.toLowerCase().includes(normalizedQuery)
            );

            if (filtered.length === 0) {
                const opt = document.createElement('option');
                opt.textContent = "一致するモデルがありません";
                opt.disabled = true;
                opt.selected = true;
                els.modelSelect.appendChild(opt);
                return;
            }

            filtered.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.name === m.id ? m.id : `${m.name} (${m.id})`;
                if (state.api.selectedModel === m.id) {
                    opt.selected = true;
                }
                els.modelSelect.appendChild(opt);
            });
        }

        /* ==========================================
         * 4. AIリクエスト送信（Gemini / OpenAI切り替え）
         * ========================================== */
        async function fetchAICompletion(userQuery) {
            const provider = state.api.provider;
            const key = state.api.apiKey;
            const model = state.api.selectedModel;
            const endpoint = state.api.endpoint;

            if (!key) {
                showError("API設定が見つかりません。右上のスライダー設定から、APIキーを登録してください。");
                throw new Error("API Key Missing");
            }

            if (!model) {
                showError("使用するAIモデルが選択されていません。右上の設定からモデルを取得して選択してください。");
                throw new Error("No Model Selected");
            }

            let maxAttempts = 5;
            let baseDelay = 1000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                try {
                    if (provider === 'gemini') {
                        let cleanModelName = model;
                        if (!cleanModelName.startsWith('models/')) {
                            cleanModelName = `models/${cleanModelName}`;
                        }
                        
                        const url = `https://generativelanguage.googleapis.com/v1beta/${cleanModelName}:generateContent?key=${key}`;
                        const payload = {
                            contents: [{ parts: [{ text: userQuery }] }],
                            generationConfig: {
                                responseMimeType: "application/json"
                            }
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error(`Gemini API [${response.status}]`);
                        }

                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) return text;
                        throw new Error("Empty Response candidate");

                    } else {
                        let cleanEndpoint = endpoint || "https://api.openai.com/v1";
                        if (cleanEndpoint.endsWith('/')) cleanEndpoint = cleanEndpoint.slice(0, -1);
                        
                        const url = `${cleanEndpoint}/chat/completions`;
                        const payload = {
                            model: model,
                            messages: [
                                { role: "user", content: userQuery }
                            ],
                            response_format: { type: "json_object" }
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${key}`
                            },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error(`OpenAI互換 API [${response.status}]`);
                        }

                        const result = await response.json();
                        const text = result.choices?.[0]?.message?.content;
                        if (text) return text;
                        throw new Error("Empty chat completion content");
                    }

                } catch (error) {
                    if (attempt === maxAttempts) {
                        showError(`AIリクエストに失敗しました。\nエラー: ${error.message}`);
                        throw error;
                    }
                    const delay = baseDelay * Math.pow(2, attempt - 1);
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        function cleanAndParseJSON(rawText) {
            let clean = rawText.trim();
            if (clean.includes('```')) {
                clean = clean.replace(/```json/gi, '');
                clean = clean.replace(/```/g, '');
            }
            return JSON.parse(clean.trim());
        }

        /* ==========================================
         * 5. フレーズ生成・再生成ロジック
         * ========================================== */
        async function fetchAIExpansion(keyword, parentContext = '', toneId = 'creative', excludeTexts = []) {
            const toneObj = state.tones.find(t => t.id === toneId) || state.tones[0];
            const tonePrompt = toneObj.prompt;

            const purposeContext = state.purpose 
                ? `この文章の最終的な目的：「${state.purpose}」\nこの目的を達成するための具体的な機能や要件、仕様として続く文章を提案してください。ユーザーに指示・命令するような文章（例：「〜を実装してください」等）は禁止します。` 
                : "明確な目的は設定されていません。ユーザーのアイデアを広げるための自然な続きの文章を提案してください。命令形は禁止します。";

            const excludeContext = excludeTexts.length > 0
                ? `\n以下の提案とは異なる切り口にしてください:\n『${excludeTexts.join("、")}』\n`
                : "";

            const userQuery = `あなたはユーザーの文章執筆や要件定義をサポートするアシスタントです。
ユーザーは「作りたいもの」や「実現したいこと」のアイデアを文章として繋げて書き出そうとしています。
これまでの文章の流れ（起点から現在地まで）は以下の通りです：
「${parentContext ? parentContext + ' -> ' : ''}${keyword}」

${purposeContext}${excludeContext}
上記の文脈を踏まえ、この文章の「自然な続き」となる一文を4パターン提案してください。

各フレーズの満たすべき条件：
1. 展開の多様性：
   - パターン1: 直前の内容をさらに具体化・詳細化する続きの一文
   - パターン2: 直前の内容の理由や背景、または期待される効果を述べる続きの一文
   - パターン3: 直前の内容とは別の角度から要件や機能を補足する続きの一文
   - パターン4: 利用者の視点や例外的なケースなど、少し飛躍した新しい要件を追加する続きの一文
2. 接続の自然さ: 前の文章から続けて読んだときに自然に意味が繋がる文章であること。
3. 文字数と構造: 15文字〜35文字程度の簡潔な一文にすること。命令形（〜してください等）や疑問形は避け、仕様やアイデアを記述する平叙文（〜である、〜を実装する、〜が必要など）にすること。
4. トーンの要望: ${tonePrompt}

アウトプットは必ず以下のJSONスキーマに従ったJSONオブジェクト形式で出力してください。他の説明テキストやマークダウンは絶対に含めないでください。

            JSON出力フォーマット例:
{
  "phrases": [

  ]
}`;

            try {
                const rawResponse = await fetchAICompletion(userQuery);

                let phrases = Array.isArray(parsed) ? parsed : (parsed.phrases || Object.values(parsed).find(v => Array.isArray(v)) || []);
                
                // 文字数チェック（JS側で40文字を超過している場合は再生成）
                for (let i = 0; i < phrases.length; i++) {
                    if (phrases[i].length > 40) {
                        phrases[i] = await fetchSingleNodeRegeneration(phrases[i], parentContext, toneId, [...excludeTexts, ...phrases.filter((_, idx) => idx !== i)], true);

                    `${keyword}の具体的な使用例を想定する`,

                ];
            }
        }

        async function fetchSingleNodeRegeneration(currentText, parentContext = '', toneId = 'creative', excludeTexts = [], isInternalRetry = false) {
            const toneObj = state.tones.find(t => t.id === toneId) || state.tones[0];

                : "ユーザーのアイデアを広げるための自然な続きの文章を提案してください。命令形は禁止します。";

            const excludeContext = excludeTexts.length > 0
                ? `\n以下は既出のため避けてください:\n『${excludeTexts.join("、")}』\n`
                : "";

            const userQuery = `あなたはユーザーの文章執筆や要件定義をサポートするアシスタントです。
これまでの文章の流れ（起点から直前まで）：

条件：
1. これまでの文脈の自然な続きでありながら、現在の提案とは異なるアプローチ（詳細化、理由の補足、新しい機能の追加など）を提供してください。
2. 接続の自然さ: 前の文章から続けて読んだときに自然に意味が繋がる文章であること。

            try {

        /* ==========================================
         * 6. キャンバス操作 (Pan & Zoom)
         * ========================================== */
        function initCanvas() {
            centerCanvas();

            els.canvasContainer.addEventListener('mousedown', (e) => {
                if (e.target.closest('.node-element') || e.target.closest('button') || e.target.closest('select') || e.target.closest('input') || e.target.closest('textarea') || e.target.closest('#settingsModal') || e.target.closest('#btnToggleDrawer')) return;
                state.isDragging = true;
                state.startX = e.clientX - state.panX;
                state.startY = e.clientY - state.panY;
                els.canvasContainer.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!state.isDragging) return;
                state.panX = e.clientX - state.startX;
                state.panY = e.clientY - state.startY;
                updateCanvasTransform();
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
                els.canvasContainer.style.cursor = 'grab';
            });

            els.canvasContainer.addEventListener('wheel', (e) => {
                if (e.target.closest('#settingsModal')) return;
                e.preventDefault();
                const zoomFactor = 1.08;
                const rect = els.canvasContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const canvasX = (mouseX - state.panX) / state.scale;
                const canvasY = (mouseY - state.panY) / state.scale;

                if (e.deltaY < 0) {
                    state.scale = Math.min(state.scale * zoomFactor, config.maxZoom);
                } else {
                    state.scale = Math.max(state.scale / zoomFactor, config.minZoom);
                }

                state.panX = mouseX - canvasX * state.scale;
                state.panY = mouseY - canvasY * state.scale;

                updateCanvasTransform();
            }, { passive: false });

            let touchStartDist = 0;
            let touchStartScale = 1;
            els.canvasContainer.addEventListener('touchstart', (e) => {
                if (e.target.closest('.node-element') || e.target.closest('#settingsModal') || e.target.closest('#btnToggleDrawer')) return;
                if (e.touches.length === 1) {
                    state.isDragging = true;
                    state.startX = e.touches[0].clientX - state.panX;
                    state.startY = e.touches[0].clientY - state.panY;
                } else if (e.touches.length === 2) {
                    state.isDragging = false;
                    touchStartDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    touchStartScale = state.scale;
                }
            });

            els.canvasContainer.addEventListener('touchmove', (e) => {
                if (state.isDragging && e.touches.length === 1) {
                    state.panX = e.touches[0].clientX - state.startX;
                    state.panY = e.touches[0].clientY - state.startY;
                    updateCanvasTransform();
                } else if (e.touches.length === 2) {
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const factor = dist / touchStartDist;
                    state.scale = Math.max(config.minZoom, Math.min(config.maxZoom, touchStartScale * factor));
                    updateCanvasTransform();
                }
            });

            els.canvasContainer.addEventListener('touchend', () => {
                state.isDragging = false;
            });
        }

        function updateCanvasTransform() {
            els.canvasContent.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
        }

        function centerCanvas() {
            const containerWidth = els.canvasContainer.clientWidth;
            const containerHeight = els.canvasContainer.clientHeight;
            state.panX = containerWidth / 2;
            state.panY = containerHeight / 2;
            state.scale = 0.9;
            updateCanvasTransform();
        }

        /* ==========================================
         * 7. ノード幾何・位置決め・接続の数理 (重なり回避システム)
         * ========================================== */
        function calculateChildCoordinates(parentNode, index, total) {
            const px = parentNode.x;
            const py = parentNode.y;
            
            let baseAngle = 0;

            if (parentNode.parentId) {
                const grandParent = state.nodes[parentNode.parentId];
                if (grandParent) {
                    baseAngle = Math.atan2(py - grandParent.y, px - grandParent.x);
                }
            } else {
                const angle = (index / total) * 2 * Math.PI;
                return findNonOverlappingCoords(px, py, angle, config.nodeRadius);
            }

            const spread = Math.PI * 0.85; 
            const startAngle = baseAngle - spread / 2;
            const step = spread / (total - 1);
            const currentAngle = startAngle + index * step;

            return findNonOverlappingCoords(px, py, currentAngle, config.nodeRadius);
        }

        function findNonOverlappingCoords(px, py, angle, initialRadius) {
            let radius = initialRadius;
            let maxAttempts = 12;
            let safeX = px + radius * Math.cos(angle);
            let safeY = py + radius * Math.sin(angle);
            
            const minDistanceX = 350; 
            const minDistanceY = 160;

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                let hasCollision = false;
                
                for (const id in state.nodes) {
                    const existingNode = state.nodes[id];
                    const dx = Math.abs(safeX - existingNode.x);
                    const dy = Math.abs(safeY - existingNode.y);
                    
                    if (dx < minDistanceX && dy < minDistanceY) {
                        hasCollision = true;
                        break;
                    }
                }
                
                if (!hasCollision) {
                    return { x: safeX, y: safeY, angle: angle };
                }
                
                radius += 100;
                safeX = px + radius * Math.cos(angle);
                safeY = py + radius * Math.sin(angle);
            }
            
            return { x: safeX, y: safeY, angle: angle };
        }

        /* ==========================================
         * 8. ノード & 線のレンダリング (DOM + SVG)
         * ========================================== */
        function createNode(text, x, y, parentId = null) {
            state.nodeCount++;
            const id = `node_${state.nodeCount}`;
            
            state.nodes[id] = {
                id,
                text,
                x,
                y,
                parentId,
                expanded: false,
                children: []
            };

            if (parentId) {
                state.nodes[parentId].children.push(id);
                state.connections.push({ parentId, childId: id });
            }

            renderNodeElement(id);
            return id;
        }

        function updateNodeActions(id) {

            const normalStyle = "bg-white border border-zinc-200 text-zinc-800 hover:border-zinc-500 dark:bg-zinc-800 dark:border-zinc-700 dark:text-zinc-200 dark:hover:border-zinc-400 px-5 py-3.5 rounded shadow-sm hover:shadow-md transition-all text-xs cursor-pointer min-w-[200px] max-w-[320px] text-center font-normal leading-relaxed";
