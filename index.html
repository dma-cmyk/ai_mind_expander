        window.startEditNode = function(id) {
            const node = state.nodes[id];
            const textSpan = document.getElementById(`text_${id}`);
            if (!textSpan || state.isGenerating) return;

            const originalText = node.text;
            const input = document.createElement('textarea');
            input.value = originalText;
            input.className = "w-full bg-transparent text-center text-xs text-zinc-800 dark:text-zinc-100 border-none focus:outline-none focus:ring-0 py-0.5 resize-none overflow-hidden leading-relaxed";
            
            textSpan.innerHTML = '';
            textSpan.appendChild(input);
            
            // Auto resize
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = input.scrollHeight + 'px';
            });

            input.focus();
            // カーソルを末尾へ
            input.selectionStart = input.selectionEnd = input.value.length;

            let isFinished = false;

            const finishEdit = () => {
                if (isFinished) return;
                isFinished = true;
                const newText = input.value.trim();
                node.text = newText || originalText;
                
                textSpan.textContent = node.text;
                updatePathDisplay();
            };

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    finishEdit();
                } else if (e.key === 'Escape') {
                    input.value = originalText;
                    finishEdit();
                }
            });

            input.addEventListener('blur', finishEdit);
        };

        window.regenerateSingleNode = async function(id) {
            const node = state.nodes[id];
            if (state.isGenerating) return;

            state.isGenerating = true;
            
            const textSpan = document.getElementById(`text_${id}`);
            const originalText = node.text;
            if (textSpan) {
                textSpan.innerHTML = `<span class="text-zinc-400 italic flex items-center justify-center gap-1.5"><i class="fa-solid fa-spinner animate-spin"></i>再編中...</span>`;
            }

            const parentContext = node.parentId ? getPathWords(node.parentId).join(' -> ') : '';
            const currentTone = els.aiTone.value;

            if (!node.rejectedHistory) {
                node.rejectedHistory = [];
            }
            node.rejectedHistory.push(originalText);

            const newText = await fetchSingleNodeRegeneration(originalText, parentContext, currentTone, node.rejectedHistory);
            
            node.text = newText;
            if (textSpan) {
                textSpan.textContent = newText;
            }

            state.isGenerating = false;
            updatePathDisplay();
        };

        window.regenerateSiblings = async function(id) {
            const node = state.nodes[id];
            if (state.isGenerating || !node.parentId) return;

            const parentNode = state.nodes[node.parentId];
            state.isGenerating = true;

            const siblingsToRemove = parentNode.children.filter(childId => childId !== id);
            
            siblingsToRemove.forEach(childId => {
                const el = document.getElementById(childId);
                if (el) el.classList.add('opacity-30');
                const textSpan = document.getElementById(`text_${childId}`);
                if (textSpan) textSpan.innerHTML = `<span class="text-zinc-400 italic flex items-center justify-center gap-1.5"><i class="fa-solid fa-spinner animate-spin"></i>再編中...</span>`;
            });

            const parentContext = parentNode.parentId ? getPathWords(parentNode.parentId).join(' -> ') : '';
            const currentTone = els.aiTone.value;

            try {
                const excludeTexts = [node.text];
                const suggestions = await fetchAIExpansion(parentNode.text, parentContext, currentTone, excludeTexts);
                
                let sIdx = 0;
                siblingsToRemove.forEach(childId => {
                    const siblingNode = state.nodes[childId];
                    const word = suggestions[sIdx] || `「${parentNode.text}」から広がる新たな思考への問い`;
                    sIdx++;
                    
                    siblingNode.text = word;
                    
                    const el = document.getElementById(childId);
                    if (el) el.classList.remove('opacity-30');
                    
                    const textSpan = document.getElementById(`text_${childId}`);
                    if (textSpan) textSpan.textContent = word;
                });
            } catch (error) {
                console.error("Sibling regeneration failed", error);
            } finally {
                state.isGenerating = false;
                drawConnections();
                updatePathDisplay();
            }
        };

        function removeNodeAndDescendants(nodeId) {
            const node = state.nodes[nodeId];
            if (!node) return;

            if (node.children && node.children.length > 0) {
                node.children.forEach(childId => {
                    removeNodeAndDescendants(childId);
                });
            }

            const el = document.getElementById(nodeId);
            if (el) el.remove();

            delete state.nodes[nodeId];
            state.connections = state.connections.filter(c => c.childId !== nodeId && c.parentId !== nodeId);
        }

        window.regenerateChildrenNodes = async function(id) {
            const node = state.nodes[id];
            if (state.isGenerating || !node.expanded || node.children.length === 0) return;

            state.isGenerating = true;

            const excludeTexts = node.children.map(childId => state.nodes[childId].text);

            // まず、孫ノード（子ノードの子孫）は意味が合わなくなるので削除する
            node.children.forEach(childId => {
                const childNode = state.nodes[childId];
                if (childNode.children && childNode.children.length > 0) {
                    const grandChildren = [...childNode.children];
                    grandChildren.forEach(gcId => {
                        removeNodeAndDescendants(gcId);
                    });
                    childNode.children = [];
                    childNode.expanded = false;
                    updateNodeActions(childId);
                }
            });

            // 子ノードをUI上でローディング状態にする
            node.children.forEach(childId => {
                const el = document.getElementById(childId);
                if (el) el.classList.add('opacity-30');
                const textSpan = document.getElementById(`text_${childId}`);
                if (textSpan) textSpan.innerHTML = `<span class="text-zinc-400 italic flex items-center justify-center gap-1.5"><i class="fa-solid fa-spinner animate-spin"></i>再編中...</span>`;
            });

            const parentContext = node.parentId ? getPathWords(node.parentId).join(' -> ') : '';
            const currentTone = els.aiTone.value;

            try {
                const suggestions = await fetchAIExpansion(node.text, parentContext, currentTone, excludeTexts);
                
                let sIdx = 0;
                node.children.forEach(childId => {
                    const childNode = state.nodes[childId];
                    const word = suggestions[sIdx] || `「${node.text}」から広がる新たな思考への問い`;
                    sIdx++;
                    
                    childNode.text = word;
                    
                    const el = document.getElementById(childId);
                    if (el) el.classList.remove('opacity-30');
                    
                    const textSpan = document.getElementById(`text_${childId}`);
                    if (textSpan) textSpan.textContent = word;
                });
            } catch (error) {
                console.error("Children regeneration failed", error);
            } finally {
                state.isGenerating = false;
                drawConnections();
                updatePathDisplay();
            }
        };

        function drawConnections() {
            els.svgConnections.innerHTML = '';
            
            const isDark = document.documentElement.classList.contains('dark');

            state.connections.forEach(conn => {
                const parent = state.nodes[conn.parentId];
                const child = state.nodes[conn.childId];
                if (!parent || !child) return;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                const x1 = parent.x + 5000;
                const y1 = parent.y + 5000;
                const x2 = child.x + 5000;
                const y2 = child.y + 5000;

                const dx = x2 - x1;
                const dy = y2 - y1;
                const controlX1 = x1 + dx * 0.4;
                const controlY1 = y1 + dy * 0.1;
                const controlX2 = x1 + dx * 0.6;
                const controlY2 = y2 - dy * 0.1;

                const isChildActive = isNodeInSelectedPath(child.id);
                // 視認性を劇的に向上させたカラー設計 (ダークモード対応)
                const strokeColor = isChildActive 
                    ? (isDark ? '#f4f4f5' : '#0f172a') 
                    : (isDark ? '#3f3f46' : '#cbd5e1'); 
                const strokeWidth = isChildActive ? '2.5' : '1.5';

                path.setAttribute('d', `M ${x1} ${y1} C ${controlX1} ${controlY1}, ${controlX2} ${controlY2}, ${x2} ${y2}`);
                path.setAttribute('stroke', strokeColor);
                path.setAttribute('stroke-width', strokeWidth);
                path.setAttribute('fill', 'none');
                
                if (isChildActive) {
                    path.setAttribute('class', 'node-connection');
                }

                els.svgConnections.appendChild(path);
            });
        }

        function isNodeInSelectedPath(nodeId) {
            if (!state.selectedNodeId) return false;
            let currentId = state.selectedNodeId;
            while (currentId) {
                if (currentId === nodeId) return true;
                currentId = state.nodes[currentId].parentId;
            }
            return false;
        }

        /* ==========================================
         * 9. インタラクション & アイデア展開
         * ========================================== */
        async function selectNode(nodeId) {
            if (!state.api.apiKey) {
                openSettingsModal();
                showError("ブレストを開始、またはフレーズを展開するには、まずAPIキーの設定を完了してください。");
                return;
            }

            state.selectedNodeId = nodeId;
            
            document.querySelectorAll('.node-element').forEach(el => {
                const isRoot = !state.nodes[el.id].parentId;
                el.classList.remove('ring-2', 'ring-zinc-400', 'border-zinc-500');
                
                if (el.id === nodeId) {
                    if (isRoot) {
                        el.classList.add('ring-2', 'ring-zinc-900');
                    } else {
                        el.classList.add('ring-2', 'ring-zinc-500', 'border-zinc-500');
                    }
                }
            });

            const node = state.nodes[nodeId];
            updatePathDisplay();

            if (!node.expanded) {
                await expandNodeWithAI(nodeId);
            }

            drawConnections();
            focusOnNode(node.x, node.y);
        }

        function focusOnNode(x, y) {
            const containerWidth = els.canvasContainer.clientWidth;
            const containerHeight = els.canvasContainer.clientHeight;
            
            state.panX = containerWidth / 2 - x * state.scale;
            state.panY = containerHeight / 2 - y * state.scale;
            
            els.canvasContent.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            updateCanvasTransform();
            
            setTimeout(() => {
                els.canvasContent.style.transition = 'none';
            }, 500);
        }

        async function expandNodeWithAI(nodeId) {
            const node = state.nodes[nodeId];
            if (node.expanded || state.isGenerating) return;

            state.isGenerating = true;
            node.expanded = true;

            const loaderIds = [];
            for (let i = 0; i < config.childCount; i++) {
                const coords = calculateChildCoordinates(node, i, config.childCount);
                const tempId = createNode('思考の糸を紡いでいます...', coords.x, coords.y, nodeId);
                loaderIds.push(tempId);
                
                const childEl = document.getElementById(tempId);
                childEl.classList.add('opacity-30');
            }
            drawConnections();

            const parentContext = node.parentId ? getPathWords(node.parentId).join(' -> ') : '';
            const currentTone = els.aiTone.value;

            try {
                const suggestions = await fetchAIExpansion(node.text, parentContext, currentTone);

                for (let i = 0; i < config.childCount; i++) {
                    const loaderId = loaderIds[i];
                    const loaderNode = state.nodes[loaderId];
                    const word = suggestions[i] || `「${node.text}」から広がる新たな思考への問い`;

                    loaderNode.text = word;
                    const el = document.getElementById(loaderId);
                    if (el) {
                        el.classList.remove('opacity-30');
                    }
                    
                    const textSpan = document.getElementById(`text_${loaderId}`);
                    if (textSpan) {
                        textSpan.textContent = word;
                    }
                }
            } catch (error) {
                console.error("AI展開失敗", error);
                loaderIds.forEach(id => removeNodeAndDescendants(id));
                node.expanded = false;
            } finally {
                state.isGenerating = false;
                drawConnections();
                updateNodeActions(nodeId);
            }
        }

        function getPathWords(nodeId) {
            if (!nodeId) return [];
            const words = [];
            let currentId = nodeId;
            while (currentId) {
                words.unshift(state.nodes[currentId].text);
                currentId = state.nodes[currentId].parentId;
            }
            return words;
        }

        function getActivePathWords() {
            return getPathWords(state.selectedNodeId);
        }

        function updatePathDisplay() {
            const words = getActivePathWords();
            els.pathWordsList.innerHTML = '';
            
            if (words.length === 0) {
                els.pathWordsList.innerHTML = `<span class="text-zinc-300 dark:text-zinc-600 italic">キャンバスのフレーズを選択してください</span>`;
                els.storyTextarea.value = '';
                return;
            }

            words.forEach((word, index) => {
                const isLast = index === words.length - 1;
                
                const span = document.createElement('span');
                span.className = isLast 
                    ? 'text-zinc-950 dark:text-zinc-50 font-semibold' 
                    : 'text-zinc-400 dark:text-zinc-500 font-light';
                span.textContent = word;
                
                els.pathWordsList.appendChild(span);

                if (!isLast) {
                    const arrow = document.createElement('i');
                    arrow.className = 'fa-solid fa-chevron-right text-zinc-300 dark:text-zinc-600 text-[8px] mx-1';
                    els.pathWordsList.appendChild(arrow);
                }
            });

            let formattedText = "";
            if (state.purpose) {
                formattedText += `【目的：${state.purpose}】\n`;
            }

            formattedText += words.map((word, index) => {
                const trimmed = word.trim();
                if (!trimmed) return '';
                const indent = "  ".repeat(index);
                return `${indent}- ${trimmed}`;
            }).join('\n');

            els.storyTextarea.value = formattedText;
        }

        /* ==========================================
         * 10. モーダル・ダイアログ制御
         * ========================================== */
        function openSettingsModal() {
            els.settingsModal.classList.remove('pointer-events-none', 'opacity-0');
            if (els.apiKey.value.trim()) {
                fetchModelsFromAPI(true); 
            }
        }

        function closeSettingsModal() {
            els.settingsModal.classList.add('pointer-events-none', 'opacity-0');
        }

        function toggleDrawer(forceOpen = null) {
            const shouldOpen = forceOpen !== null ? forceOpen : !state.drawerOpen;
            const indicator = document.getElementById('drawerIndicatorIcon');
            
            if (shouldOpen) {
                els.bottomDrawer.style.height = '270px'; // 高さを十分確保
                state.drawerOpen = true;
                if (indicator) {
                    indicator.className = 'fa-solid fa-chevron-down text-[8px] text-zinc-400 dark:text-zinc-500 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-all duration-300 transform scale-110';
                }
                // エディタコンテンツをふわっと表示し、インタラクションを有効化
                if (els.drawerContent) {
                    els.drawerContent.classList.remove('opacity-0', 'pointer-events-none');
                    els.drawerContent.classList.add('opacity-100', 'pointer-events-auto');
                }
                // ボーダーを可視化
                els.selectedPathContainer.classList.remove('border-transparent');
                els.selectedPathContainer.classList.add('border-zinc-100', 'dark:border-zinc-800');
            } else {
                els.bottomDrawer.style.height = '52px'; // 閉じている時の絶対的な高さ
                state.drawerOpen = false;
                if (indicator) {
                    indicator.className = 'fa-solid fa-chevron-up text-[8px] text-zinc-400 dark:text-zinc-500 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-all duration-300 transform scale-110';
                }
                // エディタコンテンツを完全に隠して隙間からの漏れを防ぐ
                if (els.drawerContent) {
                    els.drawerContent.classList.remove('opacity-100', 'pointer-events-auto');
                    els.drawerContent.classList.add('opacity-0', 'pointer-events-none');
                }
                // ボーダーを隠してノイズを消す
                els.selectedPathContainer.classList.add('border-transparent');
                els.selectedPathContainer.classList.remove('border-zinc-100', 'dark:border-zinc-800');
            }
        }

        function initPurposeEdit() {
            let purposeHistory = [];
            try {
                const historyRaw = localStorage.getItem('mind_expander_purpose_history');
                if (historyRaw) {
                    purposeHistory = JSON.parse(historyRaw);
                    if (!Array.isArray(purposeHistory)) purposeHistory = [];
                }
            } catch (e) {
                console.warn("Could not parse purpose history", e);
                purposeHistory = [];
            }
            
            els.displayPurpose.addEventListener('click', (e) => {
                if (state.isGenerating) return;
                
                const currentPurpose = state.purpose;
                
                const wrapper = document.createElement('div');
                wrapper.className = "relative inline-block";
                
                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentPurpose;
                input.placeholder = "目的を自由に入力（例：課題解決、企画立案）";
                input.className = "bg-transparent text-[11px] text-zinc-800 dark:text-zinc-200 border-b border-zinc-300 dark:border-zinc-700 focus:outline-none focus:border-zinc-900 dark:focus:border-zinc-400 w-[240px] px-1 py-0";
                
                const dropdown = document.createElement('div');
                dropdown.className = "absolute left-0 top-[calc(100%+4px)] w-[280px] max-h-[200px] overflow-y-auto bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded shadow-xl z-50 flex flex-col hidden scrollbar-thin";
                
                wrapper.appendChild(input);
                wrapper.appendChild(dropdown);

                const updateCustomDropdown = (filterText = '') => {
                    dropdown.innerHTML = '';
                    const filtered = purposeHistory.filter(p => p.toLowerCase().includes(filterText.toLowerCase()));
                    if (filtered.length === 0) {
                        dropdown.classList.add('hidden');
                        return;
                    }
                    dropdown.classList.remove('hidden');
                    
                    filtered.forEach((p) => {
                        const item = document.createElement('div');
                        item.className = "flex items-center justify-between px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer text-[11px] text-zinc-800 dark:text-zinc-200 border-b border-zinc-100 dark:border-zinc-800 last:border-b-0";
                        
                        const textSpan = document.createElement('span');
                        textSpan.textContent = p;
                        textSpan.className = "truncate flex-1 pr-2";
                        
                        const delBtn = document.createElement('button');
                        delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
                        delBtn.className = "text-zinc-400 hover:text-red-500 px-1.5 py-1 transition-colors rounded opacity-50 hover:opacity-100";
                        delBtn.title = "履歴から削除";
                        
                        delBtn.onclick = (ev) => {
                            ev.stopPropagation();
                            purposeHistory = purposeHistory.filter(hist => hist !== p);
                            localStorage.setItem('mind_expander_purpose_history', JSON.stringify(purposeHistory));
                            updateCustomDropdown(input.value);
                            input.focus();
                        };
                        
                        item.onclick = (ev) => {
                            ev.stopPropagation();
                            input.value = p;
                            dropdown.classList.add('hidden');
                            finishEdit(); 
                        };
                        
                        item.appendChild(textSpan);
                        item.appendChild(delBtn);
                        dropdown.appendChild(item);
                    });
                };

                els.displayPurpose.replaceWith(wrapper);
                input.focus();
                input.select();
                updateCustomDropdown('');

                let isFinished = false;

                const finishEdit = () => {
                    if (isFinished) return;
                    isFinished = true;
                    
                    const newPurpose = input.value.trim();
                    state.purpose = newPurpose || "AIにお願いするための文章の続き考えてください。";
                    
                    if (newPurpose && !purposeHistory.includes(newPurpose)) {
                        purposeHistory.unshift(newPurpose);
                        if (purposeHistory.length > 20) purposeHistory.pop();
                        localStorage.setItem('mind_expander_purpose_history', JSON.stringify(purposeHistory));
                    }
                    
                    els.displayPurpose.textContent = state.purpose;
                    wrapper.replaceWith(els.displayPurpose);
                    document.removeEventListener('mousedown', handleOutsideClick);
                };

                const handleOutsideClick = (e) => {
                    if (!wrapper.contains(e.target)) {
                        finishEdit();
                    }
                };

                document.addEventListener('mousedown', handleOutsideClick);

                input.addEventListener('input', () => updateCustomDropdown(input.value));
                input.addEventListener('focus', () => updateCustomDropdown(input.value));
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        finishEdit();
                    } else if (e.key === 'Escape') {
                        finishEdit();
                    }
                });
            });
        }

        // イベントリスナーのセットアップ
        function initUIEvents() {
            initPurposeEdit();

            // --- テーマ切り替え ---
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                if(els.themeIcon) els.themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                document.documentElement.classList.remove('dark');
                if(els.themeIcon) els.themeIcon.classList.replace('fa-sun', 'fa-moon');
            }

            els.btnToggleTheme.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                els.themeIcon.className = isDark ? 'fa-solid fa-sun text-xs' : 'fa-solid fa-moon text-xs';
                drawConnections(); // 線の色も再描画
            });
            
            // 音声入力セットアップ (Web Speech API)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition = null;
            let isRecording = false;

            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                let isAIProcessing = false;

                const resetVoiceIcon = () => {
                    isRecording = false;
                    if (!isAIProcessing) {
                        els.voiceIcon.className = 'fa-solid fa-microphone text-lg transition-all';
                        els.btnVoiceInput.classList.remove('animate-pulse', 'bg-rose-50');
                    }
                };

                recognition.onstart = function() {
                    isRecording = true;
                    isAIProcessing = false;
                    els.voiceIcon.className = 'fa-solid fa-microphone-lines text-rose-500 text-lg transition-all';
                    els.btnVoiceInput.classList.add('animate-pulse', 'bg-rose-50');
                    els.initialWordInput.placeholder = "音声を聞き取っています...";
                    els.initialWordInput.value = "";
                };

                recognition.onresult = async function(event) {
                    isRecording = false;
                    isAIProcessing = true;
                    const rawTranscript = event.results[0][0].transcript;
                    els.initialWordInput.placeholder = "AIが音声を整形中...";
                    els.voiceIcon.className = 'fa-solid fa-spinner fa-spin text-zinc-500 text-lg transition-all';
                    els.btnVoiceInput.classList.remove('animate-pulse', 'bg-rose-50');
                    
                    try {
                        const cleanText = await cleanupVoiceTextWithAI(rawTranscript);
                        els.initialWordInput.value = cleanText;
                    } catch (e) {
                        els.initialWordInput.value = rawTranscript;
                    } finally {
                        isAIProcessing = false;
                        els.initialWordInput.placeholder = "何を広げますか？（テーマ）";
                        els.initialWordInput.style.height = 'auto';
                        els.initialWordInput.style.height = els.initialWordInput.scrollHeight + 'px';
                        resetVoiceIcon();
                        els.initialWordInput.focus();
                    }
                };

                recognition.onerror = function(event) {
                    console.error("Speech recognition error", event.error);
                    isAIProcessing = false;
                    resetVoiceIcon();
                    els.initialWordInput.placeholder = "何を広げますか？（テーマ）";
                };

                recognition.onend = function() {
                    if (isRecording) {
                        resetVoiceIcon();
                        els.initialWordInput.placeholder = "何を広げますか？（テーマ）";
                    }
                };

                els.btnVoiceInput.addEventListener('click', () => {
                    if (isRecording) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                });
            } else {
                if(els.btnVoiceInput) els.btnVoiceInput.style.display = 'none';
            }

            // トーン設定モーダル周り
            els.btnOpenToneSettings.addEventListener('click', () => openToneSettingsModal());
            els.btnCloseToneSettings.addEventListener('click', () => closeToneSettingsModal());
            els.btnAddTone.addEventListener('click', () => {
                const newId = `custom_${Date.now()}`;
                tempTones.push({ id: newId, name: '', prompt: '' });
                renderToneSettingsList();
                // 一番下までスクロール
                setTimeout(() => {
                    els.toneListScrollArea.scrollTop = els.toneListScrollArea.scrollHeight;
                }, 10);
            });
            els.btnSaveTones.addEventListener('click', () => saveToneSettings());

            // つまみボタンをクリックした際の開閉
            els.btnToggleDrawer.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleDrawer();
            });

            // Route（思考ルートバー）自体をクリックした際の開閉（テキスト上のスパン除外）
            els.selectedPathContainer.addEventListener('click', (e) => {
                if (!e.target.closest('span')) {
                    toggleDrawer();
                }
            });

            els.btnRecenter.addEventListener('click', () => {
                if (state.selectedNodeId) {
                    const node = state.nodes[state.selectedNodeId];
                    focusOnNode(node.x, node.y);
                } else {
                    centerCanvas();
                }
            });

            els.btnReset.addEventListener('click', () => {
                resetApp();
            });

            // テキストエリアの自動リサイズ
            els.initialWordInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });

            // テーマ入力完了で直接ブレストをスタート
            els.initialWordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); // 改行を防ぐ
                    if (!state.api.apiKey) {
                        openSettingsModal();
                        showError("ブレストを開始するには、先に右上の設定ボタンから APIキーを設定してください。");
                        return;
                    }
                    const keyword = els.initialWordInput.value.trim();
                    if (keyword) {
                        startExpander(keyword);
                    }
                }
            });

            els.btnCopyStory.addEventListener('click', () => {
                const text = els.storyTextarea.value;
                if (!text) return;

                const showFeedback = () => {
                    els.copyFeedback.classList.remove('opacity-0');
                    els.copyFeedback.classList.add('opacity-100');
                    setTimeout(() => {
                        els.copyFeedback.classList.remove('opacity-100');
                        els.copyFeedback.classList.add('opacity-0');
                    }, 2000);
                };

                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(showFeedback).catch(err => {
                        console.error('Clipboard copy failed: ', err);
                    });
                } else {
                    const tempTextArea = document.createElement('textarea');
                    tempTextArea.value = text;
                    document.body.appendChild(tempTextArea);
                    tempTextArea.select();
                    try {
                        document.execCommand('copy');
                        showFeedback();
                    } catch (err) {
                        console.error('Fallback copy failed: ', err);
                    }
                    document.body.removeChild(tempTextArea);
                }
            });

            els.btnClearStory.addEventListener('click', () => {
                els.storyTextarea.value = '';
            });

            // --- 設定モーダル周り ---
            els.btnOpenSettings.addEventListener('click', () => openSettingsModal());
            els.btnCloseSettings.addEventListener('click', () => closeSettingsModal());
            
            els.providerGemini.addEventListener('click', () => {
                setProviderUI('gemini');
                if (els.apiKey.value.trim()) {
                    fetchModelsFromAPI(true); // 切り替え時にサイレント自動取得
                }
            });
            
            els.providerOpenAI.addEventListener('click', () => {
                setProviderUI('openai');
                if (els.apiKey.value.trim()) {
                    fetchModelsFromAPI(true); // 切り替え時にサイレント自動取得
                }
            });

            // キー入力欄 of 変更時にも自動で疎通をテスト
            els.apiKey.addEventListener('change', () => {
                if (els.apiKey.value.trim()) {
                    fetchModelsFromAPI(true);
                }
            });

            els.btnToggleKeyVisibility.addEventListener('click', () => {
                const type = els.apiKey.getAttribute('type') === 'password' ? 'text' : 'password';
                els.apiKey.setAttribute('type', type);
                els.eyeIcon.classList.toggle('fa-eye');
                els.eyeIcon.classList.toggle('fa-eye-slash');
            });

            // モデルリスト手動取得アクション
            els.btnFetchModels.addEventListener('click', () => fetchModelsFromAPI(false));

            // リアルタイムフィルタリング検索
            els.modelSearchInput.addEventListener('input', (e) => {
                renderModelsDropdown(state.api.availableModels, e.target.value);
            });

            // 設定保存ボタン
            els.btnSaveSettings.addEventListener('click', () => {
                saveAPISettings();
                closeSettingsModal();
            });

            els.btnDismissError.addEventListener('click', () => hideError());
        }

        /* ==========================================
         * 11. アプリ起動 & 状態初期化
         * ========================================== */
        function resetApp() {
            state.nodes = {};
            state.connections = [];
            state.selectedNodeId = null;
            state.nodeCount = 0;
            state.isGenerating = false;
            state.purpose = "AIにお願いするための文章の続き考えてください。";
            
            els.nodesLayer.innerHTML = '';
            els.svgConnections.innerHTML = '';
            els.storyTextarea.value = '';
            els.pathWordsList.innerHTML = `<span class="text-zinc-300 dark:text-zinc-600 italic">キャンバスのフレーズを選択してください</span>`;
            els.displayPurpose.textContent = "AIにお願いするための文章の続き考えてください。";

            els.initialInputOverlay.classList.remove('pointer-events-none', 'opacity-0');
            els.initialWordInput.value = '';
            els.initialWordInput.style.height = 'auto';
            els.inputUnderline.className = "w-24 h-[1px] bg-zinc-300 dark:bg-zinc-700 mx-auto transition-all duration-500";
            els.inputHint.textContent = "言葉を入力して [ Enter ] を押してください（Shift + Enterで改行）";
            
            toggleDrawer(false);
            centerCanvas();
            
            if (!state.api.apiKey) {
                els.apiKeyWarningBadge.classList.remove('hidden');
                els.initialSetupPrompt.classList.remove('hidden');
            }

            setTimeout(() => {
                els.initialWordInput.focus();
            }, 300);
        }

        async function startExpander(firstWord) {
            els.initialInputOverlay.classList.add('pointer-events-none', 'opacity-0');
            
            const rootId = createNode(firstWord, 0, 0, null);
            
            centerCanvas();
            await selectNode(rootId);
        }

        window.onload = function () {
            initCanvas();
            initUIEvents();
            loadToneSettings(); // トーン設定のロードとセレクトボックスの描画
            loadAPISettings(); // アプリロード時に最新モデルリストを自動でAPI疎通取得
            
            setTimeout(() => {
                els.initialWordInput.focus();
            }, 500);
        }
    </script>
</body>
